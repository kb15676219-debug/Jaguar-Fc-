<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaguar FC</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F4F9F4] text-[#0B1A14]">

    <div id="root"></div>

    <script type="text/babel">
        // Lucide Icons Mock fallback since raw ESM imports don't work natively like this
        const Lock = () => <span>🔒</span>;
        const LogOut = () => <span>🚪</span>;
        const Pencil = () => <span>✏️</span>;
        const Trash2 = () => <span>🗑️</span>;
        const Plus = () => <span>➕</span>;
        const Check = () => <span>✅</span>;
        const X = () => <span>❌</span>;
        const ShieldCheck = () => <span>🛡️</span>;
        const ArrowLeft = () => <span>⬅️</span>;
        const User = () => <span>👤</span>;

        const COLORS = {
          pitch: "#15392B",
          turf: "#2D6A4F",
          bright: "#52B788",
          chalk: "#F4F9F4",
          ink: "#0B1A14",
          amber: "#FFB703",
          line: "#D8E2DC",
        };

        const POSITIONS = ["Goalkeeper", "Defender", "Midfielder", "Forward"];
        const TEAM_COLORS = ["#E63946", "#457B9D", "#F4A261", "#7209B7", "#2A9D8F", "#E76F51", "#3A86FF", "#FB5607"];

        const POSITION_ATTRS = {
          Goalkeeper:  { key: ["Saves","Clean sheets","Conceded"], icon: "🧤" },
          Defender:    { key: ["Tackles","Clearances","Goals"],    icon: "🛡️" },
          Midfielder:  { key: ["Assists","Goals","Key passes"],    icon: "⚙️" },
          Forward:     { key: ["Goals","Assists","Shots"],         icon: "⚡" },
        };

        const today = () => new Date().toISOString().slice(0, 10);
        const fontDisplay = "'Bebas Neue', sans-serif";
        const fontMono = "'Space Mono', monospace";

        // Simple localStorage wrapper replacement for window.storage
        const localStorageBackup = {
            get: async (key) => ({ value: localStorage.getItem(key) }),
            set: async (key, val) => localStorage.setItem(key, val)
        };
        const storageEngine = window.storage || localStorageBackup;

        function buildSeed() {
          return {
            teams: [
              { id: "t1", name: "Riverside FC",     color: TEAM_COLORS[0] },
              { id: "t2", name: "Northgate United", color: TEAM_COLORS[1] },
              { id: "t3", name: "Harbor City SC",   color: TEAM_COLORS[2] },
              { id: "t4", name: "Ironwood Athletic",color: TEAM_COLORS[3] },
            ],
            players: [
              { id:"p1", name:"Mateo Silva",   email:"mateo@example.com",  age:24, position:"Forward",    team:"t1", status:"approved", goals:14, assists:5,  appearances:12, joined:"2026-03-02", bio:"Clinical finisher with an eye for goal." },
              { id:"p2", name:"Jonah Reyes",   email:"jonah@example.com",  age:27, position:"Midfielder", team:"t1", status:"approved", goals:6,  assists:11, appearances:13, joined:"2026-03-04", bio:"Creative playmaker." },
              { id:"p3", name:"Owen Pratt",    email:"owen@example.com",   age:22, position:"Defender",   team:"t2", status:"approved", goals:1,  assists:2,  appearances:11, joined:"2026-03-05", bio:"Composed on the ball." },
              { id:"p4", name:"Tariq Brooks",  email:"tariq@example.com",  age:29, position:"Forward",    team:"t2", status:"approved", goals:9,  assists:3,  appearances:12, joined:"2026-03-06", bio:"Physical presence up front." },
              { id:"p5", name:"Felix Adeyemi", email:"felix@example.com",  age:25, position:"Goalkeeper", team:"t3", status:"approved", goals:0,  assists:0,  appearances:13, joined:"2026-03-09", bio:"Commanding shot-stopper." },
              { id:"p6", name:"Caleb Nguyen",  email:"caleb@example.com",  age:23, position:"Midfielder", team:"t3", status:"approved", goals:7,  assists:8,  appearances:12, joined:"2026-03-10", bio:"Box-to-box midfielder." },
              { id:"p7", name:"Dario Conti",   email:"dario@example.com",  age:26, position:"Defender",   team:"t4", status:"approved", goals:2,  assists:1,  appearances:10, joined:"2026-03-12", bio:"Aggressive tackler." },
              { id:"p8", name:"Sam Whitfield", email:"sam@example.com",    age:31, position:"Forward",    team:"t4", status:"approved", goals:11, assists:4,  appearances:13, joined:"2026-03-12", bio:"Veteran striker." },
            ],
            matches: [
              { id:"m1", date:"2026-05-02", home:"t1", away:"t3", homeScore:3, awayScore:1 },
              { id:"m2", date:"2026-05-09", home:"t2", away:"t4", homeScore:2, awayScore:2 },
              { id:"m3", date:"2026-05-16", home:"t3", away:"t4", homeScore:0, awayScore:1 },
              { id:"m4", date:"2026-05-23", home:"t1", away:"t2", homeScore:4, awayScore:2 },
            ],
            admin: { username:"admin", password:"admin123" }
          };
        }

        function fmtDate(d) {
          return new Date(d + "T00:00:00").toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" });
        }

        function StatBar({ label, value, max, color }) {
          const pct = Math.min(100, max ? (value / max) * 100 : 0);
          return (
            <div>
              <div className="flex justify-between text-xs mb-1" style={{ fontFamily: fontMono }}>
                <span className="opacity-60 uppercase tracking-wide">{label}</span>
                <span className="font-bold">{value}</span>
              </div>
              <div className="h-1.5 rounded-full bg-neutral-200">
                <div className="h-1.5 rounded-full transition-all duration-500" style={{ width: `${pct}%`, backgroundColor: color }} />
              </div>
            </div>
          );
        }

        function PlayerProfile({ player, team, allPlayers, matches, onBack }) {
          const teamMatches = matches.filter(m => (m.home === player.team || m.away === player.team) && m.homeScore !== null);
          const leagueMax = {
            goals: Math.max(...allPlayers.map(p => p.goals), 1),
            assists: Math.max(...allPlayers.map(p => p.assists), 1),
            appearances: Math.max(...allPlayers.map(p => p.appearances), 1),
          };
          return (
            <div>
              <button onClick={onBack} className="flex items-center gap-1.5 text-sm mb-6 opacity-60 hover:opacity-100 transition-opacity" style={{ fontFamily: fontMono }}>
                <ArrowLeft /> Back
              </button>
              <div className="rounded-2xl overflow-hidden mb-6 p-6 text-white" style={{ background: COLORS.pitch }}>
                <h1 className="text-4xl" style={{ fontFamily: fontDisplay }}>{player.name}</h1>
                <p className="text-xs uppercase tracking-widest opacity-70 mt-1">{player.position} · {team ? team.name : "Unassigned"}</p>
              </div>
              <div className="grid sm:grid-cols-2 gap-6">
                <div className="rounded-xl border p-5 space-y-4 bg-white">
                  <h2 className="text-xs uppercase tracking-widest opacity-50 mb-3" style={{ fontFamily: fontMono }}>Season stats</h2>
                  <StatBar label="Appearances" value={player.appearances} max={leagueMax.appearances} color={team?.color || COLORS.turf} />
                  <StatBar label="Goals" value={player.goals} max={leagueMax.goals} color={COLORS.amber} />
                  <StatBar label="Assists" value={player.assists} max={leagueMax.assists} color={COLORS.bright} />
                </div>
              </div>
            </div>
          );
        }

        function PlayerCard({ player, team, idx, onClick }) {
          return (
            <button onClick={onClick} className="relative rounded-xl overflow-hidden bg-white shadow-sm border text-left w-full transition-shadow hover:shadow-md p-4">
              <div className="h-1 absolute top-0 left-0 right-0" style={{ background: team ? team.color : COLORS.bright }} />
              <div className="text-sm font-bold opacity-40">#{String(idx + 1).padStart(2, "0")}</div>
              <div className="text-lg font-semibold text-neutral-900 mt-1">{player.name}</div>
              <div className="text-xs uppercase tracking-widest mt-0.5" style={{ color: team ? team.color : COLORS.turf, fontFamily: fontMono }}>{player.position}</div>
            </button>
          );
        }

        function App() {
          const [data, setData] = React.useState(null);
          const [view, setView] = React.useState("home");
          const [profilePlayer, setProfilePlayer] = React.useState(null);

          React.useEffect(() => {
            storageEngine.get("msl-data").then(res => {
              if (res && res.value) { setData(JSON.parse(res.value)); } 
              else {
                const seed = buildSeed();
                storageEngine.set("msl-data", JSON.stringify(seed));
                setData(seed);
              }
            });
          }, []);

          if (!data) return <div className="p-8 text-center font-mono">Loading dynamic dashboard...</div>;

          const approvedPlayers = data.players.filter(p => p.status === "approved");
          const teamById = (id) => data.teams.find(t => t.id === id);
          const profilePlayerObj = data.players.find(p => p.id === profilePlayer);

          return (
            <div className="min-h-screen bg-slate-50">
              <header className="p-4 text-white flex justify-between items-center" style={{ background: COLORS.pitch }}>
                <button onClick={() => setView("home")} className="text-2xl font-bold tracking-wider" style={{ fontFamily: fontDisplay }}>JAGUAR 🐆 FC</button>
                <div className="flex gap-4 text-sm font-medium">
                  <button onClick={() => setView("home")}>Home</button>
                  <button onClick={() => setView("teams")}>Clubs</button>
                </div>
              </header>

              <main className="max-w-4xl mx-auto p-6">
                {view === "profile" && profilePlayerObj ? (
                  <PlayerProfile player={profilePlayerObj} team={teamById(profilePlayerObj.team)} allPlayers={approvedPlayers} matches={data.matches} onBack={() => setView("teams")} />
                ) : view === "teams" ? (
                  <div className="space-y-6">
                    <h1 className="text-3xl font-bold" style={{ fontFamily: fontDisplay }}>Clubs & Rosters</h1>
                    {data.teams.map(team => {
                      const roster = approvedPlayers.filter(p => p.team === team.id);
                      return (
                        <div key={team.id} className="bg-white p-4 rounded-xl border">
                          <h2 className="text-xl font-bold flex items-center gap-2 mb-3"><span className="w-3 h-3 rounded-full" style={{ background: team.color }}/>{team.name}</h2>
                          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            {roster.map((p, i) => <PlayerCard key={p.id} player={p} team={team} idx={i} onClick={() => { setProfilePlayer(p.id); setView("profile"); }} />)}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div className="space-y-6">
                    <section className="p-8 text-white rounded-2xl" style={{ background: COLORS.pitch }}>
                      <h1 className="text-4xl mb-2" style={{ fontFamily: fontDisplay }}>WHERE YOUR SEASON BEGINS</h1>
                      <p className="opacity-80 max-w-md text-sm">Four clubs, one table, every Saturday. Tap Clubs on the top nav menu to view player profiles.</p>
                    </section>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = tragedies = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
